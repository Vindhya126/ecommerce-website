<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyStore - Cart</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-amber-50 min-h-screen">
    <!-- Navbar -->
    <nav
      class="flex justify-between items-center bg-rose-600 text-white px-8 py-4 shadow-lg"
    >
      <a href="index.html" class="text-2xl font-bold"> MyStore </a>

      <a
        href="index.html"
        class="bg-white text-rose-600 px-5 py-2 rounded-lg hover:bg-gray-100 transition"
      >
        Continue Shopping
      </a>
    </nav>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto p-8">
      <h2 class="text-4xl font-bold text-gray-800 mb-8">Shopping Cart</h2>

      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Cart Items -->
        <div id="cart" class="lg:col-span-2 space-y-6"></div>

        <!-- Bill Summary -->
        <div
          id="billSummary"
          class="bg-white rounded-2xl shadow-lg p-6 h-fit sticky top-8"
        >
          <h2 class="text-2xl font-bold text-gray-800 mb-6">Bill Summary</h2>

          <div class="flex justify-between text-lg mb-4">
            <span>Subtotal</span>
            <span id="subtotal">$0</span>
          </div>

          <div class="flex justify-between text-lg mb-4">
            <span>Discount</span>
            <span id="discount" class="text-green-600"> -$0 </span>
          </div>

          <div class="flex justify-between text-lg mb-4">
            <span>Shipping</span>
            <span class="text-green-600"> Free </span>
          </div>

          <hr class="my-5" />

          <div class="flex justify-between text-2xl font-bold">
            <span>Total</span>

            <span id="total" class="text-rose-600"> $0 </span>
          </div>

          <button
            class="w-full mt-8 bg-rose-600 text-white py-3 rounded-lg hover:bg-rose-700 transition"
          >
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>

    <script src="cart.js"></script>
  </body>
</html>
